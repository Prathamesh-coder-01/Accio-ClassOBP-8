<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="gride-1.css" />
  </head>
  <style>
    .container {
      display: grid;
      grid-template-columns: auto auto auto;
      background-color: rgb(158, 250, 250);
      padding: 10px;
      gap: 20px;
      
    }
    .container div {
      background-color: #f1f1f1;
      border: 1px solid black;
      padding: 10px;
      font-size: 30px;
      text-align: center;
    }


    
  </style>
  <body>
    <div class="container">
      <div>1</div>
      <div>2</div>
      <div>3</div>
      <div>4</div>
      <div>5</div>
      <div>6</div>
    </div>
  </body>
</html>
